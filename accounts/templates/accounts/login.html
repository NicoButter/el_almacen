{% load static %}

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingresar - El Almacenero</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=SUSE:wght@100..800&display=swap"
      rel="stylesheet"
    />

    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" />

    <link
      href="{% static 'accounts/css/login_custom_styles.css' %}"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body>
    <div class="login-overlay"></div>

    <main class="container login-container">
      <div class="row justify-content-center w-100">
        <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">
          <div class="login-form">
            <div class="login-brand">
              <img src="{% static 'images/el_almacen_logo.png' %}" alt="El Almacenero" class="login-logo" />
            </div>
            <div class="text-center mb-4">
              <h2 class="mb-1">Bienvenido</h2>
              <p class="login-subtitle">El Almacenero - Gestión</p>
            </div>
            <form method="post">
              {% csrf_token %}
              <div class="form-group floating-label">
                <input
                  type="text"
                  id="username"
                  name="username"
                  class="form-control"
                  required
                  placeholder=" "
                  autocomplete="username"
                />
                <label for="username">Usuario</label>
              </div>
              <div class="form-group floating-label position-relative">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  required
                  placeholder=" "
                  autocomplete="current-password"
                />
                <label for="password">Contraseña</label>
                <button
                  type="button"
                  id="togglePassword"
                  class="btn-toggle-password"
                  aria-label="Mostrar contraseña"
                  aria-pressed="false"
                >
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>

              {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                  Usuario o contraseña incorrectos.
                </div>
              {% endif %}

              <button type="submit" class="btn btn-primary btn-block btn-login w-100">
                Ingresar al Sistema
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="{% static 'accounts/js/login.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
