{% extends 'base.html' %}

{% load static %}

{% block extra_styles %}
    <link href="{% static 'dashboards/css/admin_dashboard_styles.css' %}" rel="stylesheet">
    <link href="{% static 'products/css/imprimir_qr_styles.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="welcome-section">
        <h2>🏷️ Imprimir Códigos QR</h2>
        <p>Genera códigos QR para tus productos</p>
    </div>

    <div class="action-card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="producto">Seleccionar Producto:</label>
                <select name="producto" id="producto" required>
                    {% for producto in productos %}
                        <option value="{{ producto.id }}">{{ producto.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="cantidad">Cantidad de QR a Imprimir:</label>
                <input type="number" name="cantidad" id="cantidad" min="1" max="100" required>
            </div>

            <div class="action-buttons">
                <button type="submit" id="btn-generar-qr" class="btn-custom">Generar QR</button>
                <a href="{% url 'dashboard:admin_dashboard' %}" class="btn-custom">Volver al Dashboard</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
